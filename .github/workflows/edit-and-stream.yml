name: Edit & Stream Pipeline

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - Facebook
          - TikTok
          - YouTube
          - Twitch
          - Kick
          - Instagram
          - Custom RTMP
      action:
        description: 'Action'
        required: true
        type: choice
        options: [start, stop]
      source_url:
        description: 'Source video/stream URL'
        required: true
      rtmp_url:
        description: 'RTMP URL (auto-filled for known platforms, or custom)'
        required: false
        default: ''
      stream_key:
        description: 'Stream key'
        required: false
        default: ''
      video_id:
        description: 'Video ID (displayed as text overlay)'
        required: true
      fingerprint:
        description: 'Browser fingerprint string (watermark + anti-detect seed)'
        required: true
      overlay_text:
        description: 'Text shown during black screen segments'
        required: true
      reaction_image:
        description: 'URL to reaction image (webcam spot, bottom-right)'
        required: false
        default: ''
      overlay_frame:
        description: 'URL to transparent frame PNG (top layer)'
        required: false
        default: ''
      video_mins:
        description: 'Minutes of source video per cycle'
        required: false
        default: '5'
      black_mins:
        description: 'Minutes of black screen per cycle'
        required: false
        default: '5'
      pitch:
        description: 'Audio pitch multiplier (1.0 = normal, 1.5 = high)'
        required: false
        default: '1.5'
      buzz_volume:
        description: 'Background buzz volume (0.0 = off, 0.3 = loud)'
        required: false
        default: '0.15'
      cookies_b64:
        description: 'Base64-encoded cookies (Netscape format, for YouTube etc)'
        required: false
        default: ''
      extra_rtmp_url:
        description: 'Additional RTMP destination(s), comma-separated (e.g. rtmp://host/app/key,rtmp://host2/app/key2)'
        required: false
        default: ''
      self_reboot_token:
        description: 'GitHub PAT for auto-restart before 6h limit'
        required: false
        default: ''

env:
  FONT: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: github.event.inputs.action == 'start'
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/edit-and-stream.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            ffmpeg fonts-dejavu-core curl
          pip install -q --upgrade "yt-dlp[default]" curl_cffi pillow
          curl -fsSL https://deno.land/install.sh | sh || true
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          export PATH="$HOME/.deno/bin:$PATH"
          deno --version
          yt-dlp --version

      - name: Validate font
        run: |
          [ -f "$FONT" ] || { echo "FATAL: font missing at $FONT"; exit 1; }

      - name: Setup cookies
        run: |
          if [ -n "${{ inputs.cookies_b64 }}" ]; then
            printf '%s' "${{ inputs.cookies_b64 }}" | base64 -d > /tmp/cookies.txt
            echo "COOKIES=--cookies /tmp/cookies.txt" >> $GITHUB_ENV
            echo "Cookies loaded ($(wc -c < /tmp/cookies.txt) bytes)"
            head -3 /tmp/cookies.txt
          else
            echo "COOKIES=" >> $GITHUB_ENV
          fi

      - name: Download optional assets
        run: |
          mkdir -p /tmp/assets
          ASSETS_OK="true"

          if [ -n "${{ inputs.reaction_image }}" ]; then
            echo "Downloading reaction image..."
            curl -fsSL -o /tmp/assets/reaction.png "${{ inputs.reaction_image }}" 2>/dev/null \
              || python3 -c "
          import curl_cffi.requests as r
          resp = r.get('${{ inputs.reaction_image }}', impersonate='chrome')
          with open('/tmp/assets/reaction.png','wb') as f: f.write(resp.content)
          " 2>/dev/null \
              || { echo "WARN: Could not download reaction image"; ASSETS_OK="false"; }
            if [ -f /tmp/assets/reaction.png ]; then
              echo "REACTION_IMG=/tmp/assets/reaction.png" >> $GITHUB_ENV
              echo "Reaction image downloaded ($(wc -c < /tmp/assets/reaction.png) bytes)"
            fi
          fi

          if [ -n "${{ inputs.overlay_frame }}" ]; then
            echo "Downloading overlay frame..."
            curl -fsSL -o /tmp/assets/frame.png "${{ inputs.overlay_frame }}" 2>/dev/null \
              || python3 -c "
          import curl_cffi.requests as r
          resp = r.get('${{ inputs.overlay_frame }}', impersonate='chrome')
          with open('/tmp/assets/frame.png','wb') as f: f.write(resp.content)
          " 2>/dev/null \
              || { echo "WARN: Could not download overlay frame"; }
            if [ -f /tmp/assets/frame.png ]; then
              echo "OVERLAY_FRAME=/tmp/assets/frame.png" >> $GITHUB_ENV
              echo "Overlay frame downloaded ($(wc -c < /tmp/assets/frame.png) bytes)"
            fi
          fi

      - name: Determine RTMP output
        id: output
        env:
          PLATFORM: ${{ github.event.inputs.platform }}
          RTMP_URL: ${{ inputs.rtmp_url }}
          STREAM_KEY: ${{ inputs.stream_key }}
        run: |
          OUTPUT_URL=""

          case "$PLATFORM" in
            Facebook)
              if [ -n "$RTMP_URL" ]; then
                OUTPUT_URL="${RTMP_URL}${STREAM_KEY}"
              else
                OUTPUT_URL="rtmps://live-api-s.facebook.com:443/rtmp/${STREAM_KEY}"
              fi
              ;;
            TikTok)
              if [ -n "$RTMP_URL" ]; then
                OUTPUT_URL="${RTMP_URL}${STREAM_KEY}"
              else
                OUTPUT_URL="rtmp://push.tiktokv.com/live/${STREAM_KEY}"
              fi
              ;;
            YouTube)
              if [ -n "$RTMP_URL" ]; then
                OUTPUT_URL="${RTMP_URL}${STREAM_KEY}"
              else
                OUTPUT_URL="rtmp://a.rtmp.youtube.com/live2/${STREAM_KEY}"
              fi
              ;;
            Twitch)
              if [ -n "$RTMP_URL" ]; then
                OUTPUT_URL="${RTMP_URL}${STREAM_KEY}"
              else
                OUTPUT_URL="rtmp://live.twitch.tv/app/${STREAM_KEY}"
              fi
              ;;
            Kick)
              if [ -n "$RTMP_URL" ]; then
                OUTPUT_URL="${RTMP_URL}${STREAM_KEY}"
              else
                OUTPUT_URL="rtmp://fa723fc1b7b7.entrypoint.livekick.tv/app/${STREAM_KEY}"
              fi
              ;;
            Instagram)
              if [ -n "$RTMP_URL" ]; then
                OUTPUT_URL="${RTMP_URL}${STREAM_KEY}"
              else
                OUTPUT_URL="rtmps://live-api-s.facebook.com:443/rtmp/${STREAM_KEY}"
              fi
              ;;
            Custom\ RTMP)
              OUTPUT_URL="${RTMP_URL}${STREAM_KEY}"
              ;;
          esac

          if [ -z "$OUTPUT_URL" ] || [ -z "$STREAM_KEY" ]; then
            echo "ERROR: Could not determine output URL. Check RTMP_URL and STREAM_KEY."
            exit 1
          fi

          echo "Platform: $PLATFORM"
          echo "Output URL: $OUTPUT_URL"
          echo "url=$OUTPUT_URL" >> $GITHUB_OUTPUT

      - name: Resolve source URL
        id: resolve
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          COOKIES: ${{ env.COOKIES }}
        run: |
          INPUT=""
          URL="$SOURCE_URL"

          if echo "$URL" | grep -qiE '\.(m3u8)($|\?)'; then
            echo "Source: HLS direct"
            INPUT="-re -analyzeduration 10000000 -probesize 10000000 -fflags +discardcorrupt+nobuffer -i $URL"
          elif echo "$URL" | grep -qiE '\.(mp4|mkv|avi|mov|webm)($|\?)'; then
            echo "Source: Direct media (looping)"
            INPUT="-stream_loop -1 -re -i $URL"
          elif echo "$URL" | grep -qiE 'youtube\.com|youtu\.be'; then
            echo "Source: YouTube - trying multiple download methods..."
            DOWNLOADED="false"
            rm -f /tmp/source_video.mp4

            # Method 1: yt-dlp with cookies + impersonate + tv_embedded (bypasses n-challenge)
            if [ "$DOWNLOADED" = "false" ]; then
              echo "--- Method 1: yt-dlp tv_embedded + impersonate chrome ---"
              yt-dlp $COOKIES --impersonate chrome \
                --extractor-args "youtube:player_client=tv_embedded" \
                -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]/best" \
                --merge-output-format mp4 \
                -o "/tmp/source_video.mp4" \
                --no-check-certificates --socket-timeout 60 --retries 3 \
                "$URL" 2>&1 | tail -5 || true
              if [ -f "/tmp/source_video.mp4" ] && [ -s "/tmp/source_video.mp4" ]; then
                DOWNLOADED="true"
                echo "OK: $(du -h /tmp/source_video.mp4 | cut -f1)"
              fi
            fi

            # Method 2: yt-dlp with deno + default client (n-challenge solver)
            if [ "$DOWNLOADED" = "false" ]; then
              echo "--- Method 2: yt-dlp default + impersonate chrome ---"
              rm -f /tmp/source_video.mp4
              export PATH="$HOME/.deno/bin:$PATH"
              yt-dlp $COOKIES --impersonate chrome \
                -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]/best" \
                --merge-output-format mp4 \
                -o "/tmp/source_video.mp4" \
                --no-check-certificates --socket-timeout 60 \
                "$URL" 2>&1 | tail -5 || true
              if [ -f "/tmp/source_video.mp4" ] && [ -s "/tmp/source_video.mp4" ]; then
                DOWNLOADED="true"
                echo "OK: $(du -h /tmp/source_video.mp4 | cut -f1)"
              fi
            fi

            # Method 3: yt-dlp mweb player client
            if [ "$DOWNLOADED" = "false" ]; then
              echo "--- Method 3: yt-dlp mweb player client ---"
              rm -f /tmp/source_video.mp4
              export PATH="$HOME/.deno/bin:$PATH"
              yt-dlp $COOKIES \
                --extractor-args "youtube:player_client=mweb" \
                -f "best" -o "/tmp/source_video.mp4" \
                --no-check-certificates "$URL" 2>&1 | tail -5 || true
              if [ -f "/tmp/source_video.mp4" ] && [ -s "/tmp/source_video.mp4" ]; then
                DOWNLOADED="true"
                echo "OK: $(du -h /tmp/source_video.mp4 | cut -f1)"
              fi
            fi

            # Method 4: Invidious API (public instances)
            if [ "$DOWNLOADED" = "false" ]; then
              echo "--- Method 4: Invidious API ---"
              rm -f /tmp/source_video.mp4
              VIDEO_ID=$(echo "$URL" | grep -oP 'v=\K[a-zA-Z0-9_-]{11}' | head -1)
              if [ -z "$VIDEO_ID" ]; then
                VIDEO_ID=$(echo "$URL" | grep -oP 'youtu\.be/\K[a-zA-Z0-9_-]{11}' | head -1)
              fi
              echo "Video ID: $VIDEO_ID"
              for INSTANCE in "https://inv.nadeko.net" "https://invidious.nerdvpn.de" "https://vid.puffyan.us" "https://invidious.privacyredirect.com"; do
                echo "Trying $INSTANCE..."
                STREAM_URL=$(python3 -c "
          import json, urllib.request
          req = urllib.request.Request('$INSTANCE/api/v1/videos/$VIDEO_ID', headers={'User-Agent': 'Mozilla/5.0'})
          resp = urllib.request.urlopen(req, timeout=30)
          data = json.loads(resp.read().decode())
          fmts = data.get('formatStreams', []) + data.get('adaptiveFormats', [])
          best = None
          for f in fmts:
              if f.get('type','').startswith('video/mp4') and '720p' in f.get('qualityLabel',''):
                  best = f.get('url','')
                  break
          if not best:
              for f in fmts:
                  if f.get('type','').startswith('video/mp4'):
                      best = f.get('url','')
                      break
          print(best or '')
          " 2>/dev/null) || true
                if [ -n "$STREAM_URL" ]; then
                  echo "Got stream URL from $INSTANCE, downloading..."
                  curl -fsSL --max-time 300 -o /tmp/source_video.mp4 "$STREAM_URL" 2>&1 || true
                  if [ -f "/tmp/source_video.mp4" ] && [ -s "/tmp/source_video.mp4" ]; then
                    DOWNLOADED="true"
                    echo "OK from invidious: $(du -h /tmp/source_video.mp4 | cut -f1)"
                    break
                  fi
                fi
              done
            fi

            # Method 5: Piped API
            if [ "$DOWNLOADED" = "false" ]; then
              echo "--- Method 5: Piped API ---"
              rm -f /tmp/source_video.mp4
              VIDEO_ID=$(echo "$URL" | grep -oP 'v=\K[a-zA-Z0-9_-]{11}' | head -1)
              if [ -z "$VIDEO_ID" ]; then
                VIDEO_ID=$(echo "$URL" | grep -oP 'youtu\.be/\K[a-zA-Z0-9_-]{11}' | head -1)
              fi
              for INSTANCE in "https://pipedapi.kavin.rocks" "https://piped-api.privacy.com.de" "https://watchapi.whatever.social"; do
                echo "Trying $INSTANCE..."
                STREAM_URL=$(python3 -c "
          import json, urllib.request
          req = urllib.request.Request('$INSTANCE/streams/$VIDEO_ID', headers={'User-Agent': 'Mozilla/5.0'})
          resp = urllib.request.urlopen(req, timeout=30)
          data = json.loads(resp.read().decode())
          for s in data.get('videoStreams', []):
              if s.get('mimeType','').startswith('video/mp4') and s.get('videoOnly') == False:
                  print(s.get('url',''))
                  break
          else:
              for s in data.get('videoStreams', []):
                  if s.get('mimeType','').startswith('video/mp4'):
                      print(s.get('url',''))
                      break
          " 2>/dev/null) || true
                if [ -n "$STREAM_URL" ]; then
                  echo "Got stream URL from $INSTANCE, downloading..."
                  curl -fsSL --max-time 300 -o /tmp/source_video.mp4 "$STREAM_URL" 2>&1 || true
                  if [ -f "/tmp/source_video.mp4" ] && [ -s "/tmp/source_video.mp4" ]; then
                    DOWNLOADED="true"
                    echo "OK from piped: $(du -h /tmp/source_video.mp4 | cut -f1)"
                    break
                  fi
                fi
              done
            fi

            if [ "$DOWNLOADED" = "true" ]; then
              INPUT="-stream_loop -1 -re -i /tmp/source_video.mp4"
            else
              echo "ERROR: All download methods failed"
              exit 1
            fi
          else
            echo "Source: Generic URL (trying yt-dlp)"
            yt-dlp $COOKIES --impersonate chrome \
              -f "best" -o "/tmp/source_video.mp4" \
              --no-check-certificates "$URL" 2>&1 || true

            if [ -f "/tmp/source_video.mp4" ] && [ -s "/tmp/source_video.mp4" ]; then
              echo "Downloaded: $(du -h /tmp/source_video.mp4 | cut -f1)"
              INPUT="-stream_loop -1 -re -i /tmp/source_video.mp4"
            else
              echo "Falling back to direct URL"
              INPUT="-stream_loop -1 -re -i $URL"
            fi
          fi

          echo "Resolved input: $INPUT"
          echo "input=$INPUT" >> $GITHUB_OUTPUT

      - name: Build FFmpeg filter chain
        id: build
        env:
          INPUT: ${{ steps.resolve.outputs.input }}
          OVERLAY_TEXT: ${{ inputs.overlay_text }}
          VIDEO_ID: ${{ inputs.video_id }}
          FINGERPRINT: ${{ inputs.fingerprint }}
          VIDEO_MINS: ${{ inputs.video_mins }}
          BLACK_MINS: ${{ inputs.black_mins }}
          PITCH: ${{ inputs.pitch }}
          BUZZ_VOL: ${{ inputs.buzz_volume }}
          OUTPUT_URL: ${{ steps.output.outputs.url }}
          HAS_REACTION: ${{ env.REACTION_IMG }}
          HAS_FRAME: ${{ env.OVERLAY_FRAME }}
        run: |
          if [ "$IS_LIVE" = "true" ]; then
            echo "Detected LIVE stream — cycling still enabled, audio uninterrupted"
          fi

          # Calculate cycle timing
          VIDEO_SEC=$((VIDEO_MINS * 60))
          BLACK_SEC=$((BLACK_MINS * 60))
          CYCLE_SEC=$((VIDEO_SEC + BLACK_SEC))
          echo "Cycle: ${VIDEO_SEC}s video + ${BLACK_SEC}s black = ${CYCLE_SEC}s total"

          # Build input args
          INPUT_ARGS="$INPUT"

          # Add overlay frame input
          EXTRA_INPUTS=""
          if [ -n "$HAS_REACTION" ] && [ -f "$HAS_REACTION" ]; then
            EXTRA_INPUTS="$EXTRA_INPUTS -i $HAS_REACTION"
          fi
          if [ -n "$HAS_FRAME" ] && [ -f "$HAS_FRAME" ]; then
            EXTRA_INPUTS="$EXTRA_INPUTS -i $HAS_FRAME"
          fi

          # === VIDEO FILTER CHAIN ===

          ESCAPED_TEXT=$(echo "$OVERLAY_TEXT" | sed "s/'/'\\\\''/g")
          FP_ESCAPED=$(echo "$FINGERPRINT" | sed "s/'/'\\\\''/g")

          # All streams: cycle between video and black screen with text
          # Audio always plays from source (uninterrupted)
          VF="[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,format=yuv420p[scaled];"
          VF="${VF}color=c=black:s=1920x1080:r=30[bg];"
          VF="${VF}[bg]drawtext=text='${ESCAPED_TEXT}':fontfile=$FONT:fontsize=72:fontcolor=white:x=(w-text_w)/2:y=(h-text_h)/2:borderw=3:bordercolor=black[bgtext];"
          VF="${VF}[bgtext][scaled]overlay=0:0:enable='gte(mod(T\,${CYCLE_SEC})\,${VIDEO_SEC})'[cycled];"

          CURRENT="cycled"
          INPUT_IDX=1

          # Overlay reaction image (bottom-right, scaled to 25%)
          if [ -n "$HAS_REACTION" ] && [ -f "$HAS_REACTION" ]; then
            VF="${VF}[${INPUT_IDX}:v]scale=iw*0.25:ih*0.25[reaction_sm];"
            VF="${VF}[${CURRENT}][reaction_sm]overlay=W-w-20:H-h-20[reacted];"
            CURRENT="reacted"
            INPUT_IDX=$((INPUT_IDX + 1))
          fi

          # Fingerprint watermark
          VF="${VF}[${CURRENT}]drawtext=text='FP\: ${FP_ESCAPED}':fontfile=$FONT:fontsize=16:fontcolor=white@0.5:x=10:y=10[fp];"

          # Video ID text
          VF="${VF}[fp]drawtext=text='ID\: ${VIDEO_ID}':fontfile=$FONT:fontsize=16:fontcolor=white@0.5:x=10:y=32[outv]"

          # === AUDIO FILTER CHAIN ===
          AF="[0:a]asetrate=44100*${PITCH},aresample=44100[hp];"
          AF="${AF}sine=frequency=60:duration=3600:sample_rate=44100[buzz];"
          AF="${AF}[hp][buzz]amix=inputs=2:duration=first[outa]"

          # Build complete filter complex (semicolon separates video and audio chains)
          FILTER_COMPLEX="${VF};${AF}"

          echo "Filter complex built successfully"
          echo "Video inputs: source"
          [ -n "$HAS_REACTION" ] && [ -f "$HAS_REACTION" ] && echo "  + reaction image"
          [ -n "$HAS_FRAME" ] && [ -f "$HAS_FRAME" ] && echo "  + overlay frame"

          # Save to env
          echo "INPUT_ARGS=$INPUT_ARGS" >> $GITHUB_ENV
          echo "EXTRA_INPUTS=$EXTRA_INPUTS" >> $GITHUB_ENV
          echo "FILTER_COMPLEX<<FILTEREOF" >> $GITHUB_ENV
          echo "$FILTER_COMPLEX" >> $GITHUB_ENV
          echo "FILTEREOF" >> $GITHUB_ENV

      - name: Schedule self-reboot
        if: inputs.self_reboot_token != ''
        run: |
          (sleep 21000 && curl -s -X POST \
            -H "Authorization: Bearer ${{ inputs.self_reboot_token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/edit-and-stream.yml/dispatches" \
            -d '{"ref":"main","inputs":{
              "platform":"${{ inputs.platform }}",
              "action":"start",
              "source_url":"${{ inputs.source_url }}",
              "rtmp_url":"${{ inputs.rtmp_url }}",
              "stream_key":"${{ inputs.stream_key }}",
              "video_id":"${{ inputs.video_id }}",
              "fingerprint":"${{ inputs.fingerprint }}",
              "overlay_text":"${{ inputs.overlay_text }}",
              "reaction_image":"${{ inputs.reaction_image }}",
              "overlay_frame":"${{ inputs.overlay_frame }}",
              "video_mins":"${{ inputs.video_mins }}",
              "black_mins":"${{ inputs.black_mins }}",
              "pitch":"${{ inputs.pitch }}",
              "buzz_volume":"${{ inputs.buzz_volume }}",
              "cookies_b64":"${{ inputs.cookies_b64 }}",
              "extra_rtmp_url":"${{ inputs.extra_rtmp_url }}",
              "self_reboot_token":"${{ inputs.self_reboot_token }}"
            }}') &
          echo "Self-reboot scheduled (5.8h)"

      - name: Start stream
        env:
          OUTPUT_URL: ${{ steps.output.outputs.url }}
          EXTRA_RTMP: ${{ inputs.extra_rtmp_url }}
        run: |
          echo "========================================="
          echo "  EDIT & STREAM PIPELINE"
          echo "========================================="
          echo "Platform:   ${{ inputs.platform }}"
          echo "Video ID:   ${{ inputs.video_id }}"
          echo "Fingerprint: ${{ inputs.fingerprint }}"
          echo "Cycle:      ${{ inputs.video_mins }}min video + ${{ inputs.black_mins }}min black"
          echo "Pitch:      ${{ inputs.pitch }}x"
          echo "Buzz:       ${{ inputs.buzz_volume }}"
          [ -n "$EXTRA_RTMP" ] && echo "Extra RTMP: $EXTRA_RTMP"
          echo "========================================="

          # Build tee muxer output string if extra RTMP destinations exist
          if [ -n "$EXTRA_RTMP" ]; then
            # Split comma-separated URLs, build tee string
            TEE_STR="[f=flv:onfail=ignore]$OUTPUT_URL"
            IFS=',' read -ra EXTRA_URLS <<< "$EXTRA_RTMP"
            for URL in "${EXTRA_URLS[@]}"; do
              URL=$(echo "$URL" | xargs)
              if [ -n "$URL" ]; then
                TEE_STR="${TEE_STR}|[f=flv:onfail=ignore]$URL"
                echo "Added extra output: $URL"
              fi
            done
            OUTPUT_ARG="-f tee"
            OUTPUT_VAL="$TEE_STR"
          else
            OUTPUT_ARG="-f flv"
            OUTPUT_VAL="$OUTPUT_URL"
          fi

          for attempt in $(seq 1 50); do
            echo "=== Stream attempt $attempt at $(date) ==="

            ffmpeg -hide_banner -loglevel warning \
              -timeout 10000000 \
              $INPUT_ARGS \
              $EXTRA_INPUTS \
              -filter_complex "$FILTER_COMPLEX" \
              -map "[outv]" -map "[outa]" \
              -c:v libx264 -preset ultrafast -r 30 \
              -b:v 5000k -maxrate 5000k -bufsize 10000k \
              -g 150 -x264-params "keyint=150:min-keyint=150" \
              -pix_fmt yuv420p \
              -c:a aac -b:a 128k -ar 44100 \
              -flush_packets 1 \
              -max_muxing_queue_size 9999 \
              -flags +global_header \
              $OUTPUT_ARG \
              "$OUTPUT_VAL"

            EXIT_CODE=$?
            echo "ffmpeg exited with code $EXIT_CODE"
            SLEEP_TIME=$((attempt * 3))
            [ $SLEEP_TIME -gt 30 ] && SLEEP_TIME=30
            echo "Restarting in ${SLEEP_TIME}s..."
            sleep $SLEEP_TIME
          done

  stop:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'stop'
    steps:
      - name: Stop stream
        run: |
          echo "Stopping all FFmpeg processes..."
          pkill -f ffmpeg || true
          echo "Done"
